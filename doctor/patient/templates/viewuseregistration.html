{% extends 'base.html' %}
{% load static %}

{% block title %}View User Registrations{% endblock %}

{% block content %}
<div class="glass-card">
    <h2>User Registrations</h2>
    <div class="table-responsive">
        <table class="table-custom">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Contact</th>
                    <th>City</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for i in userdict %}
                <tr>
                    <td>{{i.name}}</td>
                    <td>{{i.email}}</td>
                    <td>{{i.contact}}</td>
                    <td>{{i.city}}</td>
                    <td>{{i.role}}</td>
                    <td>
                        <a href="{% url 'deluserreg' i.id %}" class="btn-action btn-delete" onclick="return confirm('Are you sure?')">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
