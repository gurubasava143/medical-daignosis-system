{% extends 'base.html' %}
{% load static %}

{% block title %}Change Password{% endblock %}

{% block extra_head %}
<style>
    .form-section {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 30px;
    }

    .form-glass-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 24px;
        padding: 45px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        color: #ffffff;
    }

    .form-glass-card h2 {
        font-family: 'Roboto Condensed', sans-serif;
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 10px;
        text-align: center;
        color: #ffffff;
    }

    .form-glass-card p {
        text-align: center;
        color: rgba(255, 255, 255, 0.7);
        margin-bottom: 35px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
    }

    .form-control-custom {
        width: 100%;
        padding: 14px 20px;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        color: #ffffff;
        transition: all 0.3s ease;
    }

    .form-control-custom:focus {
        outline: none;
        background: rgba(255, 255, 255, 0.12);
        border-color: #00e5ff;
    }

    .btn-submit {
        width: 100%;
        padding: 15px;
        margin-top: 20px;
        background: linear-gradient(135deg, #00e5ff, #0077b6);
        border: none;
        border-radius: 12px;
        color: #ffffff;
        font-weight: 600;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 10px 20px rgba(0, 229, 255, 0.2);
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 15px 30px rgba(0, 229, 255, 0.35);
    }
</style>
{% endblock %}

{% block content %}
<div class="form-section">
    <div class="form-glass-card">
        <h2>Change Password</h2>
        <p>Update your account security</p>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="old_pass">Old Password</label>
                <input type="password" id="old_pass" name="old_pass" class="form-control-custom" required>
            </div>
            <div class="form-group">
                <label for="new_pass">New Password</label>
                <input type="password" id="new_pass" name="new_pass" class="form-control-custom" required>
            </div>
            <div class="form-group">
                <label for="confirm_pass">Confirm New Password</label>
                <input type="password" id="confirm_pass" name="confirm_pass" class="form-control-custom" required>
            </div>
            <button type="submit" class="btn-submit">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
