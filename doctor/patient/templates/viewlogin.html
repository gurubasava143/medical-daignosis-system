<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>MediDiagnose - User Credentials</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Favicon -->
    <link href="{% static 'img/favicon.ico' %}" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="{% static 'style.css' %}" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: url("{% static 'main2.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 55, 100, 0.55) 0%, rgba(0, 105, 148, 0.45) 50%, rgba(0, 150, 180, 0.65) 100%);
            z-index: 0;
        }

        /* --- Navbar --- */
        .navbar-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.18);
            padding: 15px 0;
        }

        .navbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-brand-custom {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .navbar-brand-custom i {
            font-size: 28px;
            color: #00e5ff;
            margin-right: 10px;
        }

        .navbar-brand-custom h1 {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 1px;
        }

        /* --- Table Section --- */
        .table-section {
            position: relative;
            z-index: 1;
            padding: 120px 30px 60px;
            max-width: 800px;
            margin: 0 auto;
        }

        .glass-table-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow-x: auto;
        }

        .glass-table-card h2 {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
            color: #ffffff;
            text-align: center;
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            color: #ffffff;
        }

        .custom-table th {
            background: rgba(0, 229, 255, 0.2);
            padding: 15px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .custom-table td {
            padding: 15px;
            font-size: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
        }

        .custom-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-delete {
            color: #ff4d4d;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
        }

        .btn-delete i {
            margin-right: 5px;
        }

        .btn-delete:hover {
            color: #ff1a1a;
            transform: scale(1.05);
        }

        /* --- Footer --- */
        .footer-section {
            position: relative;
            z-index: 1;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            text-align: center;
            margin-top: auto;
        }

        .footer-section p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin: 0;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <div class="navbar-section">
        <div class="navbar-inner">
            <a href="{% url 'showindex' %}" class="navbar-brand-custom">
                <i class="fa fa-heartbeat"></i>
                <h1>Medical Diagnosis System</h1>
            </a>
            <div class="navbar-links">
                <a href="{% url 'showindex' %}" class="active">Home</a>
            </div>
        </div>
    </div>

    <!-- Table Section -->
    <div class="table-section">
        <div class="glass-table-card">
            <h2>User Credentials</h2>
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Password</th>
                        <th>Account Type</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in userdict %}
                    <tr>
                        <td>{{ i.username }}</td>
                        <td>••••••••</td>
                        <td>
                            <span class="badge bg-primary">{{ i.type }}</span>
                        </td>
                        <td>
                            <a href="{% url 'dellogin' i.id %}" class="btn-delete">
                                <i class="fa fa-trash"></i> Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-section">
        <p>&copy; 2026 Medical Diagnosis System. All Rights Reserved.</p>
    </div>

</body>

</html>
